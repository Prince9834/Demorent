<!DOCTYPE html>
<html>
<head>
  <title>Smart Rental Assistant</title>
  <style>
    body { font-family: Arial; background: #0f172a; color: white; }
    #chat { max-width: 420px; margin: 30px auto; padding: 15px; background: #1e293b; border-radius: 15px; height: 500px; overflow-y: auto; }
    .msg { padding: 10px; margin: 8px; border-radius: 10px; max-width: 75%; }
    .bot { background: #334155; }
    .user { background: #2563eb; margin-left: auto; text-align: right; }
    #inputBox { display: flex; max-width: 420px; margin: auto; }
    input { flex: 1; padding: 12px; border: none; outline: none; }
    button { padding: 12px; background: #2563eb; color: white; border: none; cursor: pointer; }
    .options { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px; }
    .option-btn { background: #475569; padding: 6px 10px; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>

<div id="chat"></div>
<div id="inputBox">
  <input id="input" placeholder="Type here..." />
  <button onclick="send()">Send</button>
</div>

<script>
let step = -1;
let data = {};

function addMsg(text, cls) {
  document.getElementById("chat").innerHTML += `<div class="msg ${cls}">${text}</div>`;
  scroll();
}
function scroll() {
  const chat = document.getElementById("chat");
  chat.scrollTop = chat.scrollHeight;
}

function botReply(text) {
  addMsg(text, "bot");
}

function validName(name){ return /^[a-zA-Z ]{2,}$/.test(name); }
function validPhone(phone){ return /^[+]?[0-9]{9,15}$/.test(phone); }
function validEmail(email){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email); }

function send() {
  let input = document.getElementById("input").value.trim();
  if(!input) return;
  addMsg(input, "user");
  document.getElementById("input").value = "";

  // Conversation flow
  if(step === -1){
    data.intent = input; step++;
    botReply("Hi! How can I help you today?");
    return;
  }

  if(step === 0){
    botReply("What's your name?"); step++; return;
  }

  if(step === 1){
    if(!validName(input)){ botReply("Hmm that doesn’t look like a name."); return; }
    data.name = input; step++;
    botReply("What’s your phone number?"); return;
  }

  if(step === 2){
    if(!validPhone(input)){ botReply("Number seems off."); return; }
    data.phone = input; step++;
    botReply("What type of rental are you looking for?"); return;
  }

  if(step === 3){
    data.requirement = input; step++;
    botReply("Share your email? (type 'skip' if none)"); return;
  }

  if(step === 4){
    if(input.toLowerCase() !== "skip" && !validEmail(input)){ botReply("Invalid email."); return; }
    data.email = input === "skip" ? "" : input; step++;
    botReply("When should we contact you?"); return;
  }

  if(step === 5){
    data.date = input; step++;

    // Send data to Cloud Function
    fetch("YOUR_CLOUD_FUNCTION_URL", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(res => botReply("Perfect! Your info was sent ✅"))
    .catch(err => botReply("Oops! Something went wrong."));
    return;
  }
}

// Start conversation
setTimeout(()=>{ botReply("Hey 👋 How can I help you today?"); }, 500);
</script>

</body>
</html>
